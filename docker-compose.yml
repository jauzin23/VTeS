services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3004:3001"
    environment:
      - PLAYWRIGHT_HEADLESS=True
      - PLAYWRIGHT_MAX_TABS=10
      - CACHE_MAX_SIZE=200
      - CACHE_TTL_SECONDS=600
      - AUDIT_CONCURRENCY=3
      - AUDIT_MAX_QUEUE=20
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3004
    ports:
      - "3002:80"
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 150M
